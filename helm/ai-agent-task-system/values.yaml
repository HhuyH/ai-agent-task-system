replicaCount: 1

image:
  repository: hhuyh/ai-agent-backend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx

  host: api.local

hpa:
  enabled: true

  minReplicas: 1
  maxReplicas: 5

  targetCPUUtilizationPercentage: 50

resources:
  requests:
    cpu: 250m
    memory: 256Mi

  limits:
    cpu: 500m
    memory: 512Mi